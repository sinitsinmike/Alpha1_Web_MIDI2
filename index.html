<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Alpha Sequencer Web Tool</title>

<style>
body {
    font-family: Arial, sans-serif;
    background: #f5f5f5;
    color: #222;
    padding: 30px;
}
h1 { margin-bottom: 10px; }
button {
    padding: 8px 14px;
    margin: 4px;
    border-radius: 6px;
    border: 1px solid #bbb;
    background: white;
    cursor: pointer;
}
button:hover { background: #eaeaea; }
.section {
    margin-top: 30px;
    padding-top: 15px;
    border-top: 1px solid #ccc;
}
#log {
    margin-top: 20px;
    padding: 10px;
    background: white;
    border: 1px solid #ccc;
    height: 200px;
    overflow-y: auto;
    font-size: 13px;
}
</style>
</head>

<body>

<h1>Alpha Sequencer Web Tool</h1>

<button onclick="connect()">Connect</button>
<button onclick="disconnect()">Disconnect</button>

<div class="section">
<h2>Export BIN</h2>
<div id="binButtons"></div>
<button onclick="exportAllBin()">Export ALL BIN</button>
</div>

<div class="section">
<h2>Export MIDI</h2>
<div id="midiButtons"></div>
<button onclick="exportAllMidi()">Export ALL MIDI</button>
</div>
<div class="section">
<h2>Import BIN</h2>
<div id="importBinButtons"></div>
<input type="file" id="binFileInput" style="display:none" accept=".bin">
<button onclick="importAllBin()">Import ALL BIN</button>
</div>

<div class="section">
<h2>Import MIDI</h2>
<div id="importMidiButtons"></div>
<input type="file" id="midiFileInput" style="display:none" accept=".mid">
<button onclick="importAllMidi()">Import ALL MIDI</button>
</div>
<div id="log"></div>

<script>

let port;
let reader;
let writer;
let textDecoder = new TextDecoder();
let textEncoder = new TextEncoder();
let pendingBinProject = null;
let pendingMidiProject = null;
function log(msg) {
    document.getElementById("log").innerHTML += msg + "<br>";
    document.getElementById("log").scrollTop = 999999;
}

async function connect() {
    if (port) {
        await disconnect();
    }

    port = await navigator.serial.requestPort();
    await port.open({ baudRate: 115200 });
    writer = port.writable.getWriter();
    reader = port.readable.getReader();
    log("Connected");
}

async function disconnect() {
    if (reader) {
        try { await reader.cancel(); } catch (e) {}
        try { reader.releaseLock(); } catch (e) {}
    }

    if (writer) {
        try { writer.releaseLock(); } catch (e) {}
    }

    if (port) {
        try { await port.close(); } catch (e) {}
    }

    reader = null;
    writer = null;
    port = null;

    log("Disconnected");
}

async function send(cmd) {
    // await drainReader(); // AI advized to remove this line so no freeze
    await writer.write(textEncoder.encode(cmd + "\n"));
}

async function readDump(timeoutMs = 5000) {

    let buffer = "";
    let started = false;

    while (true) {

        const result = await Promise.race([
            reader.read(),
            new Promise(resolve => setTimeout(() => resolve({ timeout: true }), timeoutMs))
        ]);

        if (result.timeout) {
            log("DUMP timeout");
            break;
        }

        const { value, done } = result;
        if (done) break;

        const chunk = textDecoder.decode(value);
        buffer += chunk;

        if (buffer.includes("ERR")) {
            break;
        }

        if (!started && buffer.includes("BEGIN")) {
            started = true;
        }

        if (started && buffer.includes("END")) {
            break;
        }
    }

    return buffer;
}

function cleanHex(raw) {

    const lines = raw.split(/\r?\n/);

    let collecting = false;
    let hex = "";

    for (let line of lines) {

        line = line.trim();

        if (line.startsWith("BEGIN")) {
            collecting = true;
            continue;
        }

        if (line.startsWith("END")) {
            break;
        }

        if (collecting) {
            hex += line;
        }
    }

    hex = hex.replace(/[^0-9A-Fa-f]/g, "");

    return hex;
}

function hexToBytes(hex) {
    let bytes = new Uint8Array(hex.length / 2);
    for (let i = 0; i < bytes.length; i++) {
        bytes[i] = parseInt(hex.substr(i*2,2),16);
    }
    return bytes;
}
async function uploadBinToDevice(project, bytes) {

    if (!bytes || bytes.length === 0) {
        log("Invalid BIN size");
        return;
    }

log("Uploading project " + project);

await send("UPLOAD " + project + " " + bytes.length);
await new Promise(resolve => setTimeout(resolve, 30));

let response = "";
const start = Date.now();

while (true) {

    if (Date.now() - start > 3000) {
        log("❌ READY timeout");
        return;
    }

    const { value, done } = await reader.read();
    if (done) return;

    const chunk = textDecoder.decode(value);
    response += chunk;

    log("Device: " + chunk.trim());

    if (response.includes("READY")) {
        break;
    }

    if (response.includes("ERR")) {
        log("❌ Device error before READY");
        return;
    }
}

    let hex = "";
    for (let b of bytes) {
        hex += b.toString(16).padStart(2,"0").toUpperCase();
    }

    log("Writing " + bytes.length + " bytes...");

    const CHUNK_HEX_SIZE = 128; // 128 HEX chars = 64 binary bytes per chunk
    
    for (let i = 0; i < hex.length; i += CHUNK_HEX_SIZE) {
        const chunk = hex.slice(i, i + CHUNK_HEX_SIZE);
        await writer.write(textEncoder.encode(chunk));
        await new Promise(resolve => setTimeout(resolve, 5));
    }

let finalResponse = "";
const startTime = Date.now();

while (true) {

    // ⬇️ TIMEOUT PROTECTION (15 sec)
    if (Date.now() - startTime > 15000) {
        log("❌ Upload timeout");
        break;
    }

    const { value, done } = await reader.read();
    if (done) break;

    const chunk = textDecoder.decode(value).trim();
    if (!chunk) continue;

    log("Device: " + chunk);

    finalResponse += chunk;

    if (
        finalResponse.includes("OK") ||
        finalResponse.includes("DONE") ||
        finalResponse.includes("ERR") ||
        finalResponse.includes("ERROR")
    ) {
        break;
    }
}

if (finalResponse.includes("OK") || finalResponse.includes("DONE")) {
    log("✅ Upload complete (project " + project + ")");
}
else if (finalResponse.includes("ERR") || finalResponse.includes("ERROR")) {
    log("❌ Upload failed");


}
}
function download(filename, data) {
    const blob = new Blob([data]);
    const a = document.createElement("a");
    a.href = URL.createObjectURL(blob);
    a.download = filename;
    a.click();
}

async function exportBin(project) {
    log("Requesting project " + project);
    await send("DUMP " + project);

    const raw = await readDump();

    if (!raw || raw.includes("ERR")) {
        log("BIN export failed for project " + project);
        return;
    }

    const hex = cleanHex(raw);

    if (!hex || hex.length < 40) {
        log("BIN export failed: empty or too short dump");
        return;
    }

    if ((hex.length % 2) !== 0) {
        log("BIN export failed: odd hex length");
        return;
    }

    const bytes = hexToBytes(hex);

    if (!bytes || bytes.length === 0) {
        log("BIN export failed: no bytes");
        return;
    }

    download("project_" + project + ".bin", bytes);
    log("BIN saved: project_" + project + ".bin (" + bytes.length + " bytes)");
}

async function exportAllBin() {
    for (let i=1;i<=10;i++) {
        await exportBin(i);
    }
}
function buildBinFromMidi(midiBytes) {

    const dv = new DataView(midiBytes.buffer);

    if (dv.getUint32(0,false) !== 0x4D546864) {
        log("Not a MIDI file");
        return null;
    }
    
const format = dv.getUint16(8,false);
const tracks = dv.getUint16(10,false);
const ppq    = dv.getUint16(12,false);

if (format === 0) {
    log("MIDI Type 0 detected");
} else if (format === 1) {
    log("MIDI Type 1 detected");
} else {
    log("Unsupported MIDI format: " + format);
    return null;
}

log("PPQ: " + ppq);

let offset = 14;
    
    let eventsPerTrack = (format === 0)
        ? new Array(16).fill(null).map(() => [])
        : [];
    let detectedBpm = 120;   // ← по умолчанию

    for (let t=0; t<tracks; t++) {

        if (dv.getUint32(offset,false) !== 0x4D54726B) {
            log("Invalid track chunk");
            return null;
        }

const length = dv.getUint32(offset+4,false);
offset += 8;
const end = offset + length;

let tick = 0;
let events = (format === 1) ? [] : null;
let runningStatus = null;

        while (offset < end) {

            let delta = 0;
            let byte;

            do {
                byte = midiBytes[offset++];
                delta = (delta << 7) | (byte & 0x7F);
            } while (byte & 0x80);

            tick += delta;

// ===== PPQ scaling to 96 =====
let scaledTick = tick;

if (ppq && ppq !== 96) {
    scaledTick = Math.round(tick * 96 / ppq);
}

            let status = midiBytes[offset++];

if (status < 0x80) {
    // running status
    offset--;
    status = runningStatus;
} else {
    runningStatus = status;
}

if (status === 0xFF) {

    const type = midiBytes[offset++];

    let len = 0;
    let b;
    do {
        b = midiBytes[offset++];
        len = (len << 7) | (b & 0x7F);
    } while (b & 0x80);

    // ===== TEMPO META EVENT =====
    if (type === 0x51 && len === 3) {

        const mpq =
            (midiBytes[offset] << 16) |
            (midiBytes[offset + 1] << 8) |
            midiBytes[offset + 2];

        detectedBpm = Math.round(60000000 / mpq);
        log("Detected BPM: " + detectedBpm);
    }

    offset += len;
    continue;
}
if (status === 0xF0 || status === 0xF7) {

    let len = 0;
    let b;
    do {
        b = midiBytes[offset++];
        len = (len << 7) | (b & 0x7F);
    } while (b & 0x80);

    offset += len;
    continue;
}

const type = status & 0xF0;
const ch   = status & 0x0F;

// Note Off

if (type === 0x80) {

    const note = midiBytes[offset++];
    const vel  = midiBytes[offset++];

    const ev = {
        tick: scaledTick,
        type: 0,
        note,
        vel: 0,
        ch
    };

    if (format === 0) {
        eventsPerTrack[ch].push(ev);
    } else {
        events.push(ev);
    }
    continue;
}

// Note On
if (type === 0x90) {
    const note = midiBytes[offset++];
    const vel  = midiBytes[offset++];

    const ev = (vel > 0)
        ? {
            tick: scaledTick,
            type: 1,
            note,
            vel,
            ch
        }
        : {
            tick: scaledTick,
            type: 0,
            note,
            vel: 0,
            ch
        };

    if (format === 0) {
        eventsPerTrack[ch].push(ev);
    } else {
        events.push(ev);
    }
    continue;
}

// 2-data-byte channel messages: A0, B0, E0
// Control Change (B0)
if (type === 0xB0) {

    const cc  = midiBytes[offset++];
    const val = midiBytes[offset++];

    // sustain only
    if (cc === 64) {

        const ev = {
            tick: scaledTick,
            type: 2,
            note: 64,
            vel: val,
            ch
        };

        if (format === 0) {
            eventsPerTrack[ch].push(ev);
        } else {
            events.push(ev);
        }
    }

    continue;
}

// A0 / E0 ignore
if (type === 0xA0 || type === 0xE0) {
    offset += 2;
    continue;
}

// 1-data-byte channel messages: C0, D0
if (type === 0xC0 || type === 0xD0) {
    offset += 1;
    continue;
}

// Unknown channel event
log("Unknown MIDI event: 0x" + status.toString(16));
return null;
        }

        if (format === 1) {
            eventsPerTrack.push(events);
        }

        offset = end;
    }

    let buffer = new Uint8Array(24576); // 24KB (совпадает с прошивкой)
    let view   = new DataView(buffer.buffer);

view.setUint32(0,0x4D534551,true);  // magic
view.setUint16(4,3,true);          // version
view.setUint16(6,16,true);         // tracks

view.setUint8(8,0);                // seqMode
view.setUint8(9,0);                // loopEnabled

view.setUint16(10,0,true);         // padding (ВАЖНО!)

view.setUint32(12,16,true);        // loopLengthBeats
    if (!detectedBpm || detectedBpm < 30 || detectedBpm > 300) {
    detectedBpm = 120;
}

view.setUint16(16, detectedBpm, true);  // bpm
view.setUint8(18,0);                   // lastProject
view.setUint8(19,0);                   // padding

    let ptr = 20;
    buffer[ptr++] = 0;

for (let t=0; t<16; t++) {

    let events;

    if (format === 0) {
        events = eventsPerTrack[t] || [];
    } else {
        // Type 1 → берём реальные треки, остальные пустые
        events = (t < eventsPerTrack.length)
            ? eventsPerTrack[t]
            : [];
    }

        if (ptr + 2 > buffer.length) {
            log("BIN buffer overflow");
            return null;
        }

if (events.length > 1024) {
    log("❌ Too many events in track");
    log("Track events: " + events.length);
    log("Limit: 1024");
    log("Conversion cancelled");
    return null;
}

view.setUint16(ptr, events.length, true);
        ptr += 2;

        for (let e of events) {

            if (ptr + 8 > buffer.length) {
                log("BIN buffer overflow");
                return null;
            }

            view.setUint32(ptr, e.tick, true);
            buffer[ptr+4] = e.type;
            buffer[ptr+5] = e.note;
            buffer[ptr+6] = e.vel;
            buffer[ptr+7] = e.ch;

            ptr += 8;
        }
    }


    if (ptr > buffer.length) {
    log("❌ FINAL BUFFER OVERFLOW: " + ptr + " > " + buffer.length);
    return null;
}

log("Built BIN size: " + ptr + " bytes");

return buffer.slice(0, ptr);

}
function buildMidiFromBin(bytes) {

    if (!bytes || bytes.length < 21) {
        log("BIN too short");
        return null;
    }

    const dv = new DataView(bytes.buffer, bytes.byteOffset, bytes.byteLength);

    const magic = dv.getUint32(0, true);
    if (magic !== 0x4D534551) {
        log("Invalid magic");
        return null;
    }

    const version = dv.getUint16(4, true);
    if (version !== 3) {
        log("Unsupported BIN version: " + version);
        return null;
    }

    const tracks = dv.getUint16(6, true);
    if (tracks <= 0 || tracks > 16) {
        log("Invalid track count: " + tracks);
        return null;
    }

    let bpm = dv.getUint16(16, true);
    if (!bpm || bpm < 30 || bpm > 300) bpm = 120;

    const headerSize = 20;
    let ptr = headerSize;

    const currentTrack = bytes[ptr];
    ptr += 1;

    const EVENT_SIZE = 8;
    const PPQ = 96;

    let trackEvents = [];

    for (let t=0; t<tracks; t++) {

        if (ptr + 2 > bytes.length) {
            log("Unexpected end of BIN while reading track count " + t);
            return null;
        }

        let count = dv.getUint16(ptr, true);
        ptr += 2;

        let events = [];

        for (let i=0; i<count; i++) {

            if (ptr + EVENT_SIZE > bytes.length) {
                log("Unexpected end of BIN while reading track " + t + ", event " + i);
                return null;
            }

            let tick = dv.getUint32(ptr, true);
            let type = bytes[ptr + 4];
            let note = bytes[ptr + 5];
            let vel  = bytes[ptr + 6];
            let ch   = bytes[ptr + 7];

            ptr += EVENT_SIZE;

            events.push({tick,type,note,vel,ch});
        }

        events.sort((a,b)=>a.tick-b.tick);
        trackEvents.push(events);
    }

    function writeVarLen(buffer, value) {
        let tmp = value & 0x7F;
        while ((value >>= 7)) {
            tmp <<= 8;
            tmp |= ((value & 0x7F) | 0x80);
        }
        while (true) {
            buffer.push(tmp & 0xFF);
            if (tmp & 0x80) tmp >>= 8;
            else break;
        }
    }

function buildTrackChunk(events, trackIndex) {

    let data = [];
    let lastTick = 0;

    // ===== Track Name Meta Event =====
    const nameStr = "Track " + (trackIndex + 1);
    const nameBytes = new TextEncoder().encode(nameStr);

    data.push(0x00);          // delta time = 0
    data.push(0xFF, 0x03);    // Meta: Track Name
    data.push(nameBytes.length);
    data.push(...nameBytes);

    // ===== Note Events =====
    for (let e of events) {

        let delta = e.tick - lastTick;
        lastTick = e.tick;

        writeVarLen(data, delta);

if (e.type == 1) {
    data.push(0x90 | (e.ch & 0x0F));
    data.push(e.note);
    data.push(e.vel);
}
else if (e.type == 0) {
    data.push(0x80 | (e.ch & 0x0F));
    data.push(e.note);
    data.push(0);
}
else if (e.type == 2) {
    data.push(0xB0 | (e.ch & 0x0F));
    data.push(e.note); // CC number, sustain = 64
    data.push(e.vel);  // CC value
}
    }

    // End of track
    data.push(0x00, 0xFF, 0x2F, 0x00);

    return data;
}

    // ========= Tempo Track =========

    let tempoTrack = [];
    const microPerQuarter = Math.round(60000000 / bpm);

    tempoTrack.push(0x00);
    tempoTrack.push(0xFF, 0x51, 0x03,
        (microPerQuarter >> 16) & 0xFF,
        (microPerQuarter >> 8) & 0xFF,
        microPerQuarter & 0xFF
    );
    // ===== Loop Start Marker =====
const markerStr = "Loop Start";
const markerBytes = new TextEncoder().encode(markerStr);

tempoTrack.push(0x00);          // delta time = 0
tempoTrack.push(0xFF, 0x06);    // Meta: Marker
tempoTrack.push(markerBytes.length);
tempoTrack.push(...markerBytes);

// End of tempo track
tempoTrack.push(0x00, 0xFF, 0x2F, 0x00);

    // ========= MIDI File =========

    let midi = [];

    midi.push(
        0x4D,0x54,0x68,0x64,
        0x00,0x00,0x00,0x06,
        0x00,0x01, // format 1
        ((tracks+1)>>8)&0xFF, (tracks+1)&0xFF,
        (PPQ>>8)&0xFF, PPQ&0xFF
    );

    function appendTrack(data) {
        midi.push(0x4D,0x54,0x72,0x6B);
        let size = data.length;
        midi.push(
            (size>>24)&0xFF,
            (size>>16)&0xFF,
            (size>>8)&0xFF,
            size&0xFF
        );
        midi.push(...data);
    }

    appendTrack(tempoTrack);

    for (let t=0; t<tracks; t++) {
    appendTrack(buildTrackChunk(trackEvents[t], t));
}

    return new Uint8Array(midi);
}

async function exportMidi(project) {
    log("Requesting project " + project);
    await send("DUMP " + project);

    const raw = await readDump();

    if (!raw || raw.includes("ERR")) {
        log("MIDI export failed for project " + project);
        return;
    }

    const hex = cleanHex(raw);
    log("Hex length: " + hex.length);

    if (!hex || hex.length < 40) {
        log("MIDI export failed: empty or too short dump");
        return;
    }

    if ((hex.length % 2) !== 0) {
        log("HEX LENGTH IS ODD!");
        return;
    }

    log("First 8 hex chars: " + hex.substring(0, 8));

    const bytes = hexToBytes(hex);
    const midi = buildMidiFromBin(bytes);

    if (!midi) {
        log("MIDI build failed");
        return;
    }

    download("project_" + project + ".mid", midi);
    log("MIDI saved: project_" + project + ".mid");
}

async function exportAllMidi() {
    for (let i=1;i<=10;i++) {
        await exportMidi(i);
    }
}

function buildButtons() {
    let binDiv = document.getElementById("binButtons");
    let midiDiv = document.getElementById("midiButtons");

    for (let i=1;i<=10;i++) {
        let b = document.createElement("button");
        b.innerText="Export BIN " + i;
        b.onclick=()=>exportBin(i);
        binDiv.appendChild(b);

        let m = document.createElement("button");
        m.innerText="Export MIDI " + i;
        m.onclick=()=>exportMidi(i);
        midiDiv.appendChild(m);
    }
}

buildButtons();
function buildImportButtons() {

    let binDiv = document.getElementById("importBinButtons");
    let midiDiv = document.getElementById("importMidiButtons");

    for (let i=1;i<=10;i++) {

        let b = document.createElement("button");
        b.innerText="Import BIN " + i;
        b.onclick=()=>selectBinFile(i);
        binDiv.appendChild(b);

        let m = document.createElement("button");
        m.innerText="Import MIDI " + i;
        m.onclick=()=>selectMidiFile(i);
        midiDiv.appendChild(m);
    }
}

buildImportButtons();

function selectBinFile(project) {
    pendingBinProject = project;
    document.getElementById("binFileInput").click();
}

document.getElementById("binFileInput").addEventListener("change", async function(e) {

    const file = e.target.files[0];
    if (!file) return;

    const arrayBuffer = await file.arrayBuffer();
    const bytes = new Uint8Array(arrayBuffer);

    await uploadBinToDevice(pendingBinProject, bytes);
e.target.value = "";
});
function selectMidiFile(project) {
    pendingMidiProject = project;
    document.getElementById("midiFileInput").click();
}

document.getElementById("midiFileInput").addEventListener("change", async function(e) {

    const file = e.target.files[0];
    if (!file) return;

    const arrayBuffer = await file.arrayBuffer();
    const midiBytes = new Uint8Array(arrayBuffer);

const binBytes = buildBinFromMidi(midiBytes);

if (!binBytes) {
    log("Invalid MIDI");
    return;
}

// ===== SIZE GUARD (Alpha7 critical fix) =====
const DEVICE_LIMIT = 24576;

if (binBytes.length > DEVICE_LIMIT) {

    log("❌ Project too large for device");
    log("Built BIN size: " + binBytes.length + " bytes");
    log("Limit: " + DEVICE_LIMIT + " bytes");
    log("Transfer cancelled");

    return;
}

    await uploadBinToDevice(pendingMidiProject, binBytes);
e.target.value = "";
});
// =====================
// IMPORT ALL (stub, чтобы не падало)
// =====================

async function importAllBin() {
    log("Bulk BIN import not supported automatically. Use per-project import.");
}

async function importAllMidi() {
    log("Bulk MIDI import not supported automatically. Use per-project import.");
}

</script>
</body>
